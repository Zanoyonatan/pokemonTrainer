<header class="top-nav">
  <a class="brand" routerLink="/app/dashboard">
    <span class="brand-icon">PT</span>
    <span>PokéTrainer AI</span>
  </a>

  <nav class="nav-links">
    <a routerLink="/app/dashboard" routerLinkActive="active">Dashboard</a>
    <a routerLink="/app/catalog" routerLinkActive="active">Catalog</a>
    <a routerLink="/app/smart-search" routerLinkActive="active">Smart Search</a>
    <a routerLink="/app/team" routerLinkActive="active">Dream Team</a>
    <a routerLink="/app/analyzer" routerLinkActive="active">Analyzer</a>
  </nav>

  <div class="trainer-area">
    @if (trainer(); as currentTrainer) {
      <span class="trainer-name">
        {{ currentTrainer.displayName || currentTrainer.trainerName || currentTrainer.email }}
      </span>
    }

    <button class="logout-button" type="button" (click)="logout()">
      Logout
    </button>
  </div>
</header>
